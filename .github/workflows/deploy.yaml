name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — token with "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID — your Cloudflare account ID (visible in any zone overview)
#
# Required Cloudflare setup (one-time, in CF dashboard):
#   Workers & Pages → Create application → Pages → Direct Upload
#     project name: portfolio   (must match `--project-name` below)
#
# Note: pages:write + id-token:write are needed because the official Zola
# action (getzola/github-pages) bundles actions/upload-pages-artifact. That
# upload happens but its output is unused — we deploy `public/` to CF via
# wrangler. The wasted artifact upload is the cost of using the official
# action's clean build + install path.

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Build & push the resume-PDF generator image to GHCR only when its
  # Dockerfile changes. Tag is content-addressed (sha-<hash-of-Dockerfile>),
  # so subsequent runs detect the existing image via `docker manifest inspect`
  # and skip the build entirely. Local `make resume` builds untagged images
  # under a different name and never touches the registry.
  resume-image:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: tools/pdf/Dockerfile
          sparse-checkout-cone-mode: false

      - name: Compute content-addressed tag
        id: tag
        run: |
          HASH=$(sha256sum tools/pdf/Dockerfile | cut -c1-12)
          IMAGE="ghcr.io/${{ github.repository }}/pdf-builder"
          echo "tag=${IMAGE}:sha-${HASH}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether image already exists
        id: check
        run: |
          if docker manifest inspect "${{ steps.tag.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: tools/pdf
          push: true
          tags: |
            ${{ steps.tag.outputs.tag }}
            ${{ steps.tag.outputs.image }}:latest
          cache-from: type=registry,ref=${{ steps.tag.outputs.image }}:latest
          cache-to: type=inline

  # Generate resume PDFs from the Zola markdown sources, using the cached
  # GHCR image. Outputs land in static/ and are passed downstream as an
  # artifact so the deploy job can drop them into static/ before zola build.
  build-pdfs:
    needs: resume-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate PDFs
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/work \
            -w /work \
            "${{ needs.resume-image.outputs.tag }}" \
            bash tools/pdf/generate.sh

      - name: Upload generated PDFs
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdfs
          path: static/*.pdf
          if-no-files-found: error
          retention-days: 30

  build-and-deploy:
    needs: build-pdfs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download generated PDFs into static/
        uses: actions/download-artifact@v4
        with:
          name: resume-pdfs
          path: static/

      - name: Clone terminus theme
        run: git clone --depth 1 https://github.com/ebkalderon/terminus.git themes/terminus

      - name: Get latest Zola version
        id: zola
        env:
          GH_TOKEN: ${{ github.token }}
        run: echo "tag=$(gh release view --repo getzola/zola --json tagName -q .tagName)" >> "$GITHUB_OUTPUT"

      - name: Build Zola + upload Pages artifact
        uses: getzola/github-pages@v1
        with:
          zola_version: ${{ steps.zola.outputs.tag }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=portfolio --branch=${{ github.ref_name }}
